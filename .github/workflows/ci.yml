name: CI

on:
  push:
    branches: 
      - master
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches: 
      - master
      - develop

jobs:
  # 代码风格检查
  checkstyle:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Check code style
      run: mvn checkstyle:check -B

  # 编译阶段
  compile:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Compile with Maven
      run: mvn clean compile -B --fail-at-end

  # 单元测试 - 必须全部通过
  unit-tests:
    runs-on: ubuntu-latest
    needs: compile  # 编译成功后才能运行测试
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: List test resources
      run: |
        echo "=== Test Resources ==="
        find src/test/resources -type f 2>/dev/null | head -20 || echo "No test resources"
    
    - name: Run all unit tests
      run: mvn clean test -B --fail-at-end
    
    - name: Generate test report
      run: mvn surefire-report:report -B
      if: always()
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/site/surefire-report.html
    
    - name: Check test results
      run: |
        echo "=== Test Summary ==="
        cat target/surefire-reports/*.txt 2>/dev/null | grep -E "Tests run:|Failures:|Errors:" || echo "No test reports found"
        
        # 检查是否有测试失败
        if grep -q "Failures: [1-9]" target/surefire-reports/*.txt 2>/dev/null || \
           grep -q "Errors: [1-9]" target/surefire-reports/*.txt 2>/dev/null; then
          echo "❌ Tests failed!"
          exit 1
        fi
        echo "✅ All tests passed!"

  # 代码覆盖率检查
  coverage:
    runs-on: ubuntu-latest
    needs: unit-tests  # 测试通过后检查覆盖率
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Generate coverage report
      run: |
        mvn clean test -B
        mvn jacoco:report -B
    
    - name: Check coverage threshold
      run: |
        # 检查覆盖率是否达到 80%
        COVERAGE=$(grep -o 'percent="[0-9]*"' target/site/jacoco/index.html | head -1 | grep -o '[0-9]*')
        echo "Current coverage: ${COVERAGE}%"
        if [ "$COVERAGE" -lt "80" ]; then
          echo "❌ Coverage ${COVERAGE}% is below threshold 80%"
          exit 1
        fi
        echo "✅ Coverage ${COVERAGE}% meets threshold 80%"
      continue-on-error: true  # 覆盖率不达标不阻断构建，但会警告
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: target/site/jacoco/jacoco.xml
        fail_ci_if_error: false
        verbose: true
