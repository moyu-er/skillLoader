name: CI

on:
  push:
    branches: 
      - master
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches: 
      - master
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Verify Maven version
      run: mvn -version
    
    - name: List test resources
      run: |
        echo "=== Test Resources ==="
        find src/test/resources -type f 2>/dev/null | head -20 || echo "No test resources"
    
    - name: Compile with Maven
      run: mvn clean compile -B --fail-at-end
    
    - name: Run tests
      run: mvn test -B --fail-at-end
      continue-on-error: true
    
    - name: Generate coverage report
      run: mvn jacoco:report -B || true
      if: always()
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: target/site/jacoco/jacoco.xml
        fail_ci_if_error: false
        verbose: true
      if: always()

  checkstyle:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Check code style
      run: mvn checkstyle:check -B || true
      continue-on-error: true
